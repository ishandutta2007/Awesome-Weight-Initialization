<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#833ab4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fd1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb045;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font: bold 45px sans-serif; fill: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
      .subtitle { font: 22px sans-serif; fill: white; opacity: 0.9; }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .floating { animation: float 3s ease-in-out infinite; }
      @keyframes pulse {
        0% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
        100% { opacity: 0.8; transform: scale(1); }
      }
      .pulsing { animation: pulse 2s infinite; transform-origin: center; }
    </style>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad)" />
  <g class="floating">
    <text x="400" y="90" text-anchor="middle" class="title pulsing">Awesome Weight Initialization</text>
    <text x="400" y="130" text-anchor="middle" class="subtitle">History, Progression, Variants, &amp; Applications 🚀</text>
  </g>
</svg>
